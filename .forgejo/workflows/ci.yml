name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: nix
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: nix shell nixpkgs#gcc13 nixpkgs#gnumake --command sh -c 'g++ --version; make --version'

      - name: Build demo binary
        run: nix shell nixpkgs#gcc13 nixpkgs#gnumake --command make all

      - name: Build and run tests
        run: nix shell nixpkgs#gcc13 nixpkgs#gnumake --command make test
